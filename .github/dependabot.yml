version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      storybook:
        patterns:
          - "@storybook/*"
          - "@chromatic-com/*"
          - storybook
      testing:
        patterns:
          - "@testing-library/*"
          - vitest
          - "@vitest/*"
      typescript:
        patterns:
          - typescript
          - typescript-eslint

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ci
