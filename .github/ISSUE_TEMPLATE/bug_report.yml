name: Bug Report
description: Report a bug in a GeekShop UI component
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - ActionBar
        - AddressCard
        - Avatar
        - Badge
        - BottomSheet
        - Button
        - CartItem
        - CategoryIcon
        - CategorySidebar
        - Checkbox
        - Container
        - CountdownTimer
        - CouponCard
        - DealCard
        - Divider
        - Empty
        - FilterBar
        - FilterPanel
        - Grid
        - HeroBanner
        - ImageLazy
        - InfiniteScroll
        - Input
        - Loading
        - NavBar
        - NoticeBar
        - OrderCard
        - OrderStatusBar
        - PaymentMethodCard
        - PopularSearches
        - Popup
        - PriceDisplay
        - ProductCard
        - ProductCarousel
        - ProductGrid
        - ProductImageGallery
        - PullToRefresh
        - QuantityStepper
        - QuickBuyPopup
        - Rating
        - ReviewCard
        - SearchBar
        - SearchSuggestions
        - Section
        - SectionHeader
        - Skeleton
        - SkuSelector
        - SpecsTable
        - Swipe
        - TabBar
        - TabFilter
        - Tag
        - Toast
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "@geekshop/ui version"
      placeholder: "0.1.0"
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "Chrome 120 / iOS 17"
