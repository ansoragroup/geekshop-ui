name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New component
        - Enhancement to existing component
        - New hook
        - Theme / Design tokens
        - Documentation
        - Tooling / DX
        - Other
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component
      description: Which component does this relate to? (leave blank for new components)
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you'd like
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this solve? How would you use it?
    validations:
      required: true
  - type: textarea
    id: api
    attributes:
      label: Proposed API
      description: If applicable, show the proposed component API
      render: tsx
