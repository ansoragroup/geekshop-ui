name: CI
on:
  push:
    branches: [main, 'feat/**', 'bugfix/**', 'v0.1.*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vitest run --project unit

  test-storybook:
    name: Storybook Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx vitest run --project storybook

  token-sync:
    name: Token Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/sync-tokens.sh --check

  build:
    name: Build Library
    needs: [lint, typecheck, test, token-sync]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:lib
      - name: Verify dist structure
        run: |
          echo "=== Checking dist output ==="
          test -f dist/es/components/index.mjs || { echo "::error::Missing dist/es/components/index.mjs"; exit 1; }
          test -f dist/cjs/components/index.cjs || { echo "::error::Missing dist/cjs/components/index.cjs"; exit 1; }
          echo "ESM entry: $(ls -la dist/es/components/index.mjs)"
          echo "CJS entry: $(ls -la dist/cjs/components/index.cjs)"
          TOTAL=$(du -sk dist/ | cut -f1)
          echo "Total dist size: ${TOTAL}KB"
          if [ "$TOTAL" -gt 2048 ]; then
            echo "::warning::Bundle size ${TOTAL}KB exceeds 2MB budget"
          fi

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build-storybook
