name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@geekshop'
      - run: npm ci --legacy-peer-deps
      - run: npm run build:lib

      - name: Verify dist
        run: |
          test -f dist/es/components/index.mjs || exit 1
          test -f dist/cjs/components/index.cjs || exit 1

      - name: Package dist as tarball
        run: tar -czf geekshop-ui-${{ github.ref_name }}.tar.gz dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: geekshop-ui-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-versions:
    name: Cleanup Old Version Branches
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Keep only last 5 version branches
        run: |
          # List all v0.1.* remote branches sorted by version
          VERSION_BRANCHES=$(git branch -r --list 'origin/v0.1.*' | sed 's|origin/||' | sort -V)
          COUNT=$(echo "$VERSION_BRANCHES" | grep -c '^v' || true)
          echo "Found $COUNT version branches"
          if [ "$COUNT" -gt 5 ]; then
            TO_DELETE=$(echo "$VERSION_BRANCHES" | head -n $(($COUNT - 5)))
            echo "Deleting old branches: $TO_DELETE"
            for branch in $TO_DELETE; do
              echo "Deleting origin/$branch"
              git push origin --delete "$branch" || true
            done
          else
            echo "No cleanup needed ($COUNT <= 5)"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
